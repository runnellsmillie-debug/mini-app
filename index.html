<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>1Money Family ERP</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg-dark: #0f172a; --bg-card: #1e293b; --primary: #3b82f6; --success: #10b981; --danger: #ef4444; --border-color: #334155; }
        body { margin: 0; background-color: var(--bg-dark); color: #f8fafc; font-family: -apple-system, BlinkMacSystemFont, sans-serif; padding: 15px; padding-bottom: 80px; max-width: 480px; margin: 0 auto; box-sizing: border-box; }
        .input-text { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid var(--border-color); background: var(--bg-dark); color: #fff; box-sizing: border-box; margin-bottom: 8px; }
        .btn-primary { width: 100%; padding: 12px; border: none; border-radius: 10px; color: white; font-weight: bold; cursor: pointer; background: var(--primary); margin-bottom: 5px; }
        .hidden { display: none !important; }
        .cat-scroll-container { display: flex; overflow-x: auto; gap: 8px; padding: 5px 0; margin-bottom: 10px; }
        .cat-btn { flex: 0 0 80px; padding: 10px; border-radius: 12px; border: 1px solid var(--border-color); background: var(--bg-card); color: #fff; text-align: center; font-size: 11px; font-weight: bold; }
        .num-display { font-size: 32px; font-weight: bold; text-align: center; margin: 10px 0; color: var(--success); }
        .num-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; }
        .num-btn { background: var(--bg-card); border: 1px solid var(--border-color); color: #fff; padding: 15px; border-radius: 8px; font-size: 18px; }
    </style>
</head>
<body>

    <script>
        function formatInput(val) { return val.replace(/\D/g, "").replace(/\B(?=(\d{3})+(?!\d))/g, " "); }
        function unformat(val) { return val.replace(/\s/g, ""); }
    </script>

    <div id="tab-add" class="tab-content">
        <div id="num-display" class="num-display">0</div>
        <div id="cats-header-container"></div>
        <div id="cats-container" class="cat-scroll-container"></div>
        <input type="text" id="add-desc" class="input-text" placeholder="Izoh..." />
        <div class="num-grid">
            <button class="num-btn" onclick="addNum('1')">1</button><button class="num-btn" onclick="addNum('2')">2</button><button class="num-btn" onclick="addNum('3')">3</button>
            <button class="num-btn" onclick="addNum('4')">4</button><button class="num-btn" onclick="addNum('5')">5</button><button class="num-btn" onclick="addNum('6')">6</button>
            <button class="num-btn" onclick="addNum('7')">7</button><button class="num-btn" onclick="addNum('8')">8</button><button class="num-btn" onclick="addNum('9')">9</button>
            <button class="num-btn" onclick="clearNum()">C</button><button class="num-btn" onclick="addNum('0')">0</button><button class="num-btn" onclick="delNum()">⌫</button>
        </div>
    </div>

    <script>
        let currentNum = "";
        function addNum(n) { currentNum += n; el("num-display").innerText = formatInput(currentNum); }
        function clearNum() { currentNum = ""; el("num-display").innerText = "0"; }
        function delNum() { currentNum = currentNum.slice(0, -1); el("num-display").innerText = currentNum ? formatInput(currentNum) : "0"; }
        
        // Kredit qismi uchun
        function toggleGraceFields() {
            const isChecked = el("credit-grace-check").checked;
            document.getElementById("grace-fields").style.display = isChecked ? "flex" : "none";
        }

        // Toifalarni render qilish (Dinamik)
        function renderCats() {
            const container = el("cats-container");
            container.innerHTML = "";
            // Misol uchun asosiy bo'limlar
            const categories = [
                { id: "oziq", name: "Oziq-ovqat", icon: "🛒" },
                { id: "uy", name: "Uy", icon: "🏠" },
                { id: "avto", name: "Avto", icon: "🚗" }
            ];
            categories.forEach(c => {
                let btn = document.createElement("button");
                btn.className = "cat-btn";
                btn.innerHTML = `<span>${c.icon}</span><br>${c.name}`;
                btn.onclick = () => showSubCats(c.id);
                container.appendChild(btn);
            });
        }
        
        function showSubCats(catId) {
            const container = el("cats-container");
            container.innerHTML = `<button class="btn-primary" onclick="renderCats()">⬅ Orqaga</button>`;
            // Sub-toifalarni shu yerda ro'yxat qilasiz...
        }

        renderCats();
        const el = id => document.getElementById(id);
    </script>
</body>
</html>

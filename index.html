<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>1Money Clone - Telegram Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { margin: 0; background-color: #121212; color: #ffffff; font-family: -apple-system, sans-serif; overflow: hidden; touch-action: none; }
        .circle-btn { position: absolute; width: 60px; height: 60px; border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; border: none; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .circle-btn:active { transform: scale(0.9); }
        .center-circle { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); width: 130px; height: 130px; border-radius: 50%; background: #1e1e1e; border: 4px solid #333; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; box-shadow: inset 0 0 15px rgba(0,0,0,0.5); }
        .numpad-btn { background: #1e1e1e; border: 1px solid #2a2a2a; color: #fff; font-size: 24px; padding: 15px 0; border-radius: 12px; cursor: pointer; }
        .numpad-btn:active { background: #333; }
        /* 1Money style colors */
        .color-expense { color: #ff5252; }
        .color-income { color: #4caf50; }
    </style>
</head>
<body>
    
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const tg = window.Telegram.WebApp;
        
        try { tg.ready(); tg.expand(); } catch(e) {}

        const EXPENSE_CATS = [
          { id: "oziq", label: "Oziq-ovqat", icon: "🛒", color: "#FF9800" },
          { id: "oila", label: "Oila/Bolalar", icon: "🧸", color: "#E91E63" },
          { id: "jetour", label: "Jetour", icon: "🚗", color: "#2196F3" },
          { id: "kredit", label: "Kredit/Uy", icon: "🏠", color: "#9C27B0" },
          { id: "imsoa", label: "IMSOA xarajati", icon: "🏢", color: "#607D8B" },
          { id: "soglik", label: "Sog'liq", icon: "💊", color: "#F44336" },
          { id: "kiyim", label: "Kiyim", icon: "👔", color: "#00BCD4" },
          { id: "boshqa", label: "Boshqa", icon: "📦", color: "#795548" }
        ];

        const INCOME_CATS = [
          { id: "maosh", label: "Oylik maosh", icon: "💼", color: "#4CAF50" },
          { id: "imsoa_kirim", label: "IMSOA daromad", icon: "💰", color: "#009688" },
          { id: "qarz", label: "Qarz qaytdi", icon: "🤝", color: "#CDDC39" },
          { id: "boshqa_k", label: "Qo'shimcha", icon: "🎁", color: "#FFC107" }
        ];

        const STORAGE_KEY = "1money_clone_v1";

        function loadData() {
          try {
            const raw = localStorage.getItem(STORAGE_KEY);
            return raw ? JSON.parse(raw) : { transactions: [] };
          } catch {
            return { transactions: [] };
          }
        }

        function formatMoney(n) {
          if (!n) return "0";
          return new Intl.NumberFormat("uz-UZ").format(n);
        }

        function App() {
          const [data, setData] = useState(loadData);
          const [type, setType] = useState("expense"); // expense or income
          const [account, setAccount] = useState("card"); // card or cash
          const [amountStr, setAmountStr] = useState("");
          
          const [toast, setToast] = useState(null);
          const [sessionData, setSessionData] = useState([]);

          useEffect(() => { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }, [data]);

          const showToast = (msg, isError = false) => {
            setToast({ msg, color: isError ? "#F44336" : "#4CAF50" });
            setTimeout(() => setToast(null), 2500);
          };

          const handleNumpad = (val) => {
            if (val === "C") setAmountStr("");
            else if (val === "⌫") setAmountStr(prev => prev.slice(0, -1));
            else if (amountStr.length < 10) setAmountStr(prev => prev + val);
          };

          // Hisob-kitoblar
          const cashBalance = data.transactions.filter(t => t.account === 'cash').reduce((s,t) => t.type==='income' ? s+t.amount : s-t.amount, 0);
          const cardBalance = data.transactions.filter(t => t.account === 'card').reduce((s,t) => t.type==='income' ? s+t.amount : s-t.amount, 0);
          const totalBalance = cashBalance + cardBalance;

          // Xarajatni saqlash (1Money mantiqi: Kategoriya bosilganda saqlanadi)
          const handleCategoryClick = (cat) => {
            const amt = parseInt(amountStr);
            if (!amt || amt <= 0) { 
                showToast("Avval summani kiriting!", true); 
                return; 
            }

            const newItem = {
              id: Date.now(), 
              amount: amt, 
              desc: cat.label,
              cat: cat.id, 
              type: type, 
              account: account,
              date: new Date().toISOString().slice(0, 10)
            };

            setData(d => ({ ...d, transactions: [newItem, ...(d.transactions||[])] }));
            
            // Telegram bot uchun
            const methodStr = account === "cash" ? "💵 Naqd" : "💳 Plastik";
            setSessionData(prev => [...prev, { amount: amt, category: `${cat.label} (${methodStr})`, type: type === "expense" ? "minus" : "plus" }]);
            
            showToast(`${cat.label} ga saqlandi!`);
            setAmountStr(""); // Summani tozalash
          };

          function sendToTelegram() {
            if(sessionData.length > 0) tg.sendData(JSON.stringify(sessionData));
            else tg.close();
          }

          // Doira shaklida joylashtirish matematikasi
          const currentCats = type === "expense" ? EXPENSE_CATS : INCOME_CATS;
          const radius = 120; // O'rtadagi doiradan uzoqligi
          
          return (
            <div style={{ display: "flex", flexDirection: "column", height: "100vh" }}>
              {toast && (
                <div style={{ position:"absolute", top:15, left:"50%", transform:"translateX(-50%)", background: toast.color, padding:"10px 20px", borderRadius:20, zIndex:1000, fontWeight:"bold" }}>
                  {toast.msg}
                </div>
              )}

              {/* TEPADAGI QISM: Hisoblar va Balans */}
              <div style={{ padding: "15px", background: "#1e1e1e", borderBottom: "1px solid #333", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                <div onClick={() => setAccount("card")} style={{ opacity: account==="card"?1:0.4, transition:"0.2s", textAlign:"center", flex:1, borderRight:"1px solid #333" }}>
                    <div style={{fontSize:12, color:"#888"}}>💳 Plastik</div>
                    <div style={{fontWeight:"bold", fontSize:14}}>{formatMoney(cardBalance)}</div>
                </div>
                <div style={{ flex: 1.5, textAlign: "center" }}>
                    <div style={{fontSize:10, color:"#888", textTransform:"uppercase"}}>Umumiy Balans</div>
                    <div style={{fontSize:22, fontWeight:"bold", color: totalBalance<0?"#F44336":"#fff"}}>{formatMoney(totalBalance)}</div>
                </div>
                <div onClick={() => setAccount("cash")} style={{ opacity: account==="cash"?1:0.4, transition:"0.2s", textAlign:"center", flex:1, borderLeft:"1px solid #333" }}>
                    <div style={{fontSize:12, color:"#888"}}>💵 Naqd</div>
                    <div style={{fontWeight:"bold", fontSize:14}}>{formatMoney(cashBalance)}</div>
                </div>
              </div>

              {/* O'RTADAGI QISM: 1Money Doira Interfeysi */}
              <div style={{ flex: 1, position: "relative", display: "flex", alignItems: "center", justifyContent: "center", background:"#121212" }}>
                  
                  {/* Markazdagi asosiy summa */}
                  <div className="center-circle" style={{ borderColor: type==="expense" ? "#ff5252" : "#4caf50" }}>
                      <div style={{ fontSize: amountStr.length > 7 ? 18 : 24, fontWeight: "bold", color: type==="expense" ? "#ff5252" : "#4caf50" }}>
                          {amountStr ? formatMoney(parseInt(amountStr)) : "0"}
                      </div>
                      <div style={{ fontSize: 12, color: "#888", marginTop: 5 }}>UZS</div>
                  </div>

                  {/* Atrofdagi kategoriyalar */}
                  {currentCats.map((cat, i) => {
                      // Trigonometriya yordamida doira bo'ylab taxlash
                      const angle = (i / currentCats.length) * 2 * Math.PI - Math.PI / 2;
                      const x = Math.cos(angle) * radius;
                      const y = Math.sin(angle) * radius;
                      
                      return (
                          <button key={cat.id} className="circle-btn" onClick={() => handleCategoryClick(cat)} 
                                  style={{ background: cat.color, transform: `translate(${x}px, ${y}px)` }}>
                              <span style={{ fontSize: 24 }}>{cat.icon}</span>
                              <span style={{ fontSize: 9, color: "#fff", fontWeight: "bold", position: "absolute", bottom: -18, whiteSpace: "nowrap", background:"rgba(0,0,0,0.5)", padding:"2px 5px", borderRadius:5 }}>
                                  {cat.label}
                              </span>
                          </button>
                      );
                  })}
              </div>

              {/* PASTKI QISM: Numpad va Toggles */}
              <div style={{ background: "#1e1e1e", padding: "15px", paddingBottom: "30px", borderTop: "1px solid #333", borderTopLeftRadius:20, borderTopRightRadius:20 }}>
                  
                  {/* Daromad/Xarajat o'zgartirgich */}
                  <div style={{ display: "flex", gap: 10, marginBottom: 15 }}>
                      <button onClick={() => setType("expense")} style={{ flex:1, padding:10, borderRadius:10, border:"none", background: type==="expense"?"#ff5252":"#2a2a2a", color:"#fff", fontWeight:"bold", transition:"0.2s" }}>Chiqim</button>
                      <button onClick={() => setType("income")} style={{ flex:1, padding:10, borderRadius:10, border:"none", background: type==="income"?"#4caf50":"#2a2a2a", color:"#fff", fontWeight:"bold", transition:"0.2s" }}>Kirim</button>
                  </div>

                  {/* Numpad */}
                  <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 10 }}>
                      {["1","2","3","4","5","6","7","8","9","C","0","⌫"].map(btn => (
                          <button key={btn} className="numpad-btn" onClick={() => handleNumpad(btn)}>{btn}</button>
                      ))}
                  </div>

                  {/* Telegramga jo'natish tugmasi */}
                  <button onClick={sendToTelegram} style={{ width: "100%", marginTop: 15, padding: 15, background: "#2196F3", color: "#fff", border: "none", borderRadius: 12, fontSize: 16, fontWeight: "bold" }}>
                      Yopish va Botga yuborish ({sessionData.length})
                  </button>
              </div>

            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

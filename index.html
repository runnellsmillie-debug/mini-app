<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>1Money Family ERP v2</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { margin: 0; background-color: #0f172a; color: #f8fafc; font-family: -apple-system, BlinkMacSystemFont, sans-serif; -webkit-user-select: none; user-select: none; padding: 12px; max-width: 430px; margin: 0 auto; box-sizing: border-box; }
        
        .profile-bar { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 12px; margin-bottom: 12px; border-bottom: 1px solid #1e293b; scrollbar-width: none; }
        .profile-bar::-webkit-scrollbar { display: none; }
        .profile-item { display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; opacity: 0.5; transition: 0.2s; min-width: 55px; }
        .profile-item.active { opacity: 1; transform: scale(1.05); }
        .profile-avatar { width: 50px; height: 50px; border-radius: 50%; background: #1e293b; border: 2px solid #334155; display: flex; align-items: center; justify-content: center; font-size: 24px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .profile-item.active .profile-avatar { border-color: #3b82f6; background: rgba(59, 130, 246, 0.2); }
        .profile-name { font-size: 11px; font-weight: bold; color: #cbd5e1; max-width: 60px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; text-align: center; }
        .profile-item.active .profile-name { color: #3b82f6; }

        .tabs { display: flex; gap: 6px; margin-bottom: 12px; }
        .tab-btn { flex: 1; padding: 10px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; background: #1e293b; color: #64748b; font-size: 12px; transition: 0.2s; }
        .tab-btn.active { background: #3b82f6; color: #fff; }
        
        .balance-main { background: linear-gradient(135deg, #1e293b, #0f172a); border: 1px solid #334155; border-radius: 20px; padding: 15px; text-align: center; margin-bottom: 12px; }
        .balance-grid { display: flex; gap: 8px; margin-bottom: 12px; }
        .balance-card { background: #1e293b; border: 1px solid #334155; border-radius: 16px; padding: 12px; flex: 1; box-sizing: border-box; }
        .widget-box { background: #1e293b; border: 1px solid #334155; border-radius: 16px; padding: 12px; margin-bottom: 12px; }
        
        .mode-selector, .acc-selector { display: flex; gap: 6px; margin-bottom: 10px; }
        .mode-btn, .acc-btn { flex: 1; padding: 10px; border-radius: 10px; border: none; font-weight: bold; color: #fff; background: #1e293b; cursor: pointer; font-size: 13px; }
        .num-display { font-size: 32px; font-weight: bold; text-align: center; margin-bottom: 10px; height: 40px; color: #fff; }
        
        .grid-container { background: rgba(255,255,255,0.02); padding: 10px; border-radius: 14px; margin-bottom: 10px; border: 1px dashed #334155; }
        .cat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
        .sub-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
        .cat-grid-btn { padding: 12px 2px; border: none; border-radius: 14px; color: #fff; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content:center; gap: 4px; font-weight: bold; font-size: 10px; transition: 0.1s; text-align:center; min-height:65px;}
        .cat-grid-btn:active { transform: scale(0.95); }
        
        .num-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-bottom: 8px; }
        .num-btn { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); color: #fff; font-size: 22px; border-radius: 14px; padding: 14px 0; cursor: pointer; outline: none; }
        .num-btn:active { background: rgba(255, 255, 255, 0.15); }
        .input-text { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #334155; background: #1e293b; color: #fff; font-size: 15px; box-sizing: border-box; outline: none; margin-bottom: 10px; }
        
        .date-input-group { display: flex; gap: 6px; margin-bottom: 12px; }
        .date-picker { flex: 1; padding: 10px; border-radius: 10px; background: #1e293b; border: 1px solid #334155; color: #fff; font-size: 13px; outline: none; }
        .history-item { display: flex; align-items: center; background: #1e293b; padding: 10px; border-radius: 12px; margin-bottom: 6px; font-size: 13px; }
        .progress-bar-bg { background: rgba(255,255,255,0.05); border-radius: 4px; height: 6px; overflow: hidden; margin: 6px 0; }
        .progress-bar-fill { height: 100%; border-radius: 4px; }
        .delete-btn { background: none; border: none; color: #ef4444; font-weight: bold; cursor: pointer; font-size: 16px; margin-left: auto; padding: 5px; }
        .scheduled-item { display: flex; justify-content: space-between; align-items: center; font-size: 13px; margin-bottom: 6px; background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.3); padding: 10px; border-radius: 10px; cursor: pointer; }
        #toast-msg { display: none; position: fixed; top: 20px; left: 50%; transform: translateX(-50%); padding: 12px 24px; border-radius: 20px; z-index: 9999; font-weight: bold; font-size: 14px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }

        #modal-overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.7); z-index: 1000; justify-content: center; align-items: center; }
        .modal-box { background: #0f172a; padding: 20px; border-radius: 20px; border: 1px solid #334155; width: 85%; max-width: 320px; }
        .user-stat-card { background: #334155; padding: 8px 12px; border-radius: 10px; flex: 1; text-align: center; }
    </style>
</head>
<body>

    <div id="toast-msg"></div>

    <div id="modal-overlay">

            <input type="text" id="prof-name" class="input-text" placeholder="Ism (Masalan: Ilyos)" />
            <div style="display:flex; gap:6px; margin-bottom:10px;">
                <input type="number" id="prof-age" class="input-text" placeholder="Yoshi" style="flex:1; margin:0;" />
                <select id="prof-gender" class="input-text" style="flex:2; margin:0;">
                    <option value="male">O'g'il / Erkak</option>
                    <option value="female">Qiz / Ayol</option>
                </select>
            </div>
            <input type="text" id="prof-emoji" class="input-text" placeholder="Emoji (Masalan: 👦)" value="👤" />
            <div style="display:flex; gap:10px; margin-top:10px;">
                <button onclick="closeProfileModal()" style="flex:1; padding:12px; border-radius:10px; border:none; background:#334155; color:#fff; font-weight:bold;">Bekor qilish</button>
                <button onclick="saveNewProfile()" style="flex:1; padding:12px; border-radius:10px; border:none; background:#10b981; color:#fff; font-weight:bold;">Saqlash</button>
            </div>
        </div>
    </div>

    <div class="profile-bar" id="profiles-container"></div>

    <div class="tabs">
        <button id="btn-home" class="tab-btn active" onclick="switchTab('home')">Asosiy</button>
        <button id="btn-add" class="tab-btn" onclick="switchTab('add')">Kiritish</button>
        <button id="btn-debts" class="tab-btn" onclick="switchTab('debts')">Qarz 🤝</button>
        <button id="btn-report" class="tab-btn" onclick="switchTab('report')">Hisobot 📊</button>
    </div>

    <div id="tab-home">
        <div class="balance-main">
            <div style="color: #94a3b8; font-size: 11px; text-transform: uppercase;">Oilaviy Umumiy Qoldiq</div>
            <div id="main-total-balance" style="font-size: 26px; font-weight: bold; margin: 5px 0;">0 so'm</div>
        </div>
        <div class="balance-grid">
            <div class="balance-card">
                <div style="font-size: 11px; color: #94a3b8;">💳 Plastik</div>
                <div id="main-card-balance" style="font-size: 14px; font-weight: bold;">0 so'm</div>
            </div>
            <div class="balance-card">
                <div style="font-size: 11px; color: #94a3b8;">💵 Naqd</div>
                <div id="main-cash-balance" style="font-size: 14px; font-weight: bold;">0 so'm</div>
            </div>
        </div>

        <div style="font-size: 13px; font-weight: bold; color: #94a3b8; margin-bottom: 8px;">
            <span id="home-history-title">Bugungi amallar:</span>
        </div>
        <div id="home-today-list"></div>
        <button onclick="sendToTelegram()" style="width:100%; padding:14px; background:#10b981; color:white; border:none; font-weight:bold; margin-top:20px; font-size:14px; border-radius:12px; cursor:pointer;">
            ✅ Telegramga saqlash (<span id="session-count">0</span>)
        </button>
    </div>

    <div id="tab-add" style="display: none;">
        <div class="mode-selector">
            <button id="mode-exp" class="mode-btn" style="background:#ef4444;" onclick="setAddMode('expense')">▼ Chiqim</button>
            <button id="mode-inc" class="mode-btn" onclick="setAddMode('income')">▲ Kirim</button>
            <button id="mode-trn" class="mode-btn" onclick="setAddMode('transfer')">🔄 O'tkazma</button>
        </div>
        <div id="normal-acc-selector" class="acc-selector">
            <button id="acc-card" class="acc-btn" style="border: 1px solid #3b82f6;" onclick="setAccountType('card')">💳 Plastik</button>
            <button id="acc-cash" class="acc-btn" onclick="setAccountType('cash')">💵 Naqd</button>
        </div>
        <div id="transfer-acc-selector" class="acc-selector" style="display:none;">

            <button id="trn-dir-cash-card" class="acc-btn" onclick="setTransferDir('cash-to-card')">💵 Naqd ➔ 💳 Plastik</button>
        </div>

        <div id="num-display" class="num-display">0</div>

            <button class="num-btn" onclick="pressNum('3')">3</button>
            <button class="num-btn" onclick="pressNum('4')">4</button>
            <button class="num-btn" onclick="pressNum('5')">5</button>
            <button class="num-btn" onclick="pressNum('6')">6</button>
            <button class="num-btn" onclick="pressNum('7')">7</button>
            <button class="num-btn" onclick="pressNum('8')">8</button>
            <button class="num-btn" onclick="pressNum('9')">9</button>
            <button class="num-btn" style="color:#ef4444;" onclick="pressNum('C')">C</button>
            <button class="num-btn" onclick="pressNum('0')">0</button>
            <button class="num-btn" onclick="pressNum('⌫')">⌫</button>
        </div>

    </div>

    <div id="tab-debts" style="display: none;">
        <div class="widget-box">
            <div style="font-size: 13px; font-weight: bold; margin-bottom: 8px;">🤝 Yangi qarz amali:</div>
            <input type="text" id="debt-name" placeholder="Ism yozing..." class="input-text" />
            <input type="number" id="debt-amount" placeholder="Summa (so'mda)..." class="input-text" />
            <div class="acc-selector">
                <button id="debt-acc-card" class="acc-btn" style="border:1px solid #3b82f6;" onclick="setDebtAccount('card')">💳 Plastikka</button>
                <button id="debt-acc-cash" class="acc-btn" onclick="setDebtAccount('cash')">💵 Naqdga</button>
            </div>
            <div class="mode-selector">
                <button id="debt-type-take" class="mode-btn" style="background:#84cc16;" onclick="setDebtType('take')">Menga qaytaradi</button>

        </div>
        <div style="font-size:13px; font-weight:bold; color:#94a3b8; margin-bottom:8px;">Faol qarzlar:</div>
        <div id="debts-list"></div>
    </div>

          { id: "uy", label: "Uy / Xo'jalik", icon: "🏠", color: "#FBBF24", subs: [ { id: "kommunal", label: "Kommunal", icon: "🧾", items: []}, { id: "xoja", label: "Xo'jalik/Tozalik", icon: "🧽", items: []} ]},
          { id: "gozallik", label: "Go'zallik/Salon", icon: "💅", color: "#E91E63", subs: [ { id: "salon", label: "Go'zallik Saloni", icon: "✂️", items: []}, { id: "kosmetika", label: "Kosmetika/Atir", icon: "💄", items: []} ]},
          { id: "kiyim", label: "Ayollar kiyimi", icon: "👗", color: "#F48FB1", subs: []},
          { id: "soglik", label: "Sog'liq", icon: "💊", color: "#34D399", subs: []},
          { id: "boshqa", label: "Boshqa/Kredit", icon: "📦", color: "#94A3B8", subs: [] }
        ];

        const INCOME_SOURCES = [ { id: "maosh", label: "Oylik maosh", icon: "💼" }, { id: "imsoa_k", label: "IMSOA foyda", icon: "💰" }, { id: "boshqa_k", label: "Qo'shimcha", icon: "🎁" } ];
        const OY_NOMLARI = ["Yanvar", "Fevral", "Mart", "Aprel", "May", "Iyun", "Iyul", "Avgust", "Sentabr", "Oktabr", "Noyabr", "Dekabr"];

        let state = { 
            profiles: [{ id: "general", name: "Umumiy", icon: "🏠", age: null, gender: "male" }],
            transactions: [], incomes: [], debts: [] 
        };
        let currentProfileId = "general";
        let currentTab = "home"; let addMode = "expense"; let accountType = "card"; let transferDir = "card-to-cash";
        let activeMainCat = null; let activeSubCat = null; 
        let amountStr = ""; let debtType = "take"; let debtAccount = "card";
        let sessionData = []; let telegramUserName = "Siz";

        function setTxt(id, text) { const el = document.getElementById(id); if(el) el.innerText = text; }
        function setHtml(id, content) { const el = document.getElementById(id); if(el) el.innerHTML = content; }
        function setVal(id, value) { const el = document.getElementById(id); if(el) el.value = value; }
        function getVal(id) { const el = document.getElementById(id); return el ? el.value : ""; }

        try { if (tg.initDataUnsafe && tg.initDataUnsafe.user && tg.initDataUnsafe.user.first_name) { telegramUserName = tg.initDataUnsafe.user.first_name; } } catch(e) {}

        function showToast(msg, isError = false) {
            const toast = document.getElementById("toast-msg"); if(!toast) return;
            toast.innerText = msg; toast.style.background = isError ? "#EF4444" : "#10B981";
            toast.style.display = "block"; setTimeout(() => { toast.style.display = "none"; }, 2500);
        }

        function init() {
            const raw = localStorage.getItem("xarajat_erp_v2");
            if (raw) { 
                try { state = JSON.parse(raw); } catch(e) {} 
            } else {
                const oldRaw = localStorage.getItem("xarajat_erp_v1");
                if (oldRaw) { try { state = JSON.parse(oldRaw); } catch(e) {} }
            }
            if (!state.profiles) state.profiles = [{ id: "general", name: "Umumiy", icon: "🏠", age: null, gender: "male" }];
            if (!state.transactions) state.transactions = []; if (!state.incomes) state.incomes = []; if (!state.debts) state.debts = [];
            renderProfilesBar();
            render();
        }

        function saveState() { localStorage.setItem("xarajat_erp_v2", JSON.stringify(state)); render(); }

        // PROFILES MANAGEMENT
        function renderProfilesBar() {
            let html = "";
            state.profiles.forEach(p => {
                const isActive = p.id === currentProfileId ? "active" : "";
                html += `<div class="profile-item ${isActive}" onclick="selectProfile('${p.id}')">
                    <div class="profile-avatar">${p.icon}</div>
                    <div class="profile-name">${p.name}</div>
                </div>`;
            });
            html += `<div class="profile-item" onclick="openProfileModal()">
                <div class="profile-avatar" style="border-style:dashed;">➕</div>
                <div class="profile-name">Qo'shish</div>
            </div>`;
            setHtml("profiles-container", html);
        }

        window.selectProfile = function(id) {
            currentProfileId = id;
            const prof = state.profiles.find(p => p.id === id);
            setTxt("home-history-title", `Bugun (${prof.name}):`);
            setTxt("report-title-text", `📊 Hisobot: ${prof.name}`);
            activeMainCat = null; activeSubCat = null; 
            renderProfilesBar();
            updateInputModes(); // Yoshga qarab tugmalarni tekshirish
            render();
        }

        window.openProfileModal = function() { document.getElementById("modal-overlay").style.display = "flex"; }
        window.closeProfileModal = function() { document.getElementById("modal-overlay").style.display = "none"; }
        
        window.saveNewProfile = function() {
            const name = getVal("prof-name").trim();
            const age = parseInt(getVal("prof-age"));
            const gender = getVal("prof-gender");
            const emoji = getVal("prof-emoji").trim() || (gender === 'female' ? "👧" : "👦");
            if(!name) { showToast("Profil ismini kiriting!", true); return; }
            
            const newProf = { id: "p_" + Date.now(), name: name, age: isNaN(age) ? null : age, gender: gender, icon: emoji };
            state.profiles.push(newProf);
            closeProfileModal();
            setVal("prof-name", ""); setVal("prof-age", ""); setVal("prof-emoji", "");
            saveState(); renderProfilesBar(); showToast("Profil yaratildi!");
        }

        // BOLALAR UCHUN KIRIM TUGMALARINI YASHIRISH LOGIKASI
        function updateInputModes() {
            const prof = state.profiles.find(p => p.id === currentProfileId);
            const isChild = prof && prof.age !== null && prof.age < 18 && currentProfileId !== "general";

            if (isChild) {
                document.getElementById("mode-inc").style.display = "none";
                document.getElementById("mode-trn").style.display = "none";
                if(addMode !== "expense") setAddMode("expense");
            } else {
                document.getElementById("mode-inc").style.display = "block";
                document.getElementById("mode-trn").style.display = "block";
            }
        }

        window.switchTab = function(tabId) {
            currentTab = tabId;
            document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
            const activeBtn = document.getElementById("btn-" + tabId); if(activeBtn) activeBtn.classList.add("active");
            
            ["home", "add", "debts", "report"].forEach(t => {
                const el = document.getElementById("tab-"+t);
                if(el) el.style.display = t === tabId ? "block" : "none";
            });
            if(tabId === 'add') updateInputModes();
            render();
        }

        window.pressNum = function(val) {
            if (val === "C") amountStr = "";
            else if (val === "⌫") amountStr = amountStr.slice(0, -1);
            else if (amountStr.length < 10) amountStr += val;
            setTxt("num-display", amountStr ? new Intl.NumberFormat("uz-UZ").format(parseInt(amountStr)) : "0");
        }

        window.setAddMode = function(mode) {
            addMode = mode; activeMainCat = null; activeSubCat = null;
            document.getElementById("mode-exp").style.background = mode === "expense" ? "#ef4444" : "#1e293b";
            document.getElementById("mode-inc").style.background = mode === "income" ? "#10b981" : "#1e293b";
            document.getElementById("mode-trn").style.background = mode === "transfer" ? "#3b82f6" : "#1e293b";
            
            document.getElementById("normal-acc-selector").style.display = mode === "transfer" ? "none" : "flex";
            document.getElementById("transfer-acc-selector").style.display = mode === "transfer" ? "flex" : "none";
            document.getElementById("cats-container").style.display = mode === "transfer" ? "none" : "block";
            document.getElementById("btn-do-transfer").style.display = mode === "transfer" ? "block" : "none";
            setHtml("stay-hint", ""); renderCats();
        }

        window.setAccountType = function(acc) {
            accountType = acc;
            document.getElementById("acc-card").style.border = acc === "card" ? "1px solid #3b82f6" : "none";
            document.getElementById("acc-cash").style.border = acc === "cash" ? "1px solid #10b981" : "none";
        }

        function formatMoney(n) { return new Intl.NumberFormat("uz-UZ").format(Math.round(Math.abs(n))) + " so'm"; }

        // AI CATEGORY SELECTOR based on Age & Gender
        function getCurrentProfileCategories() {
            if(currentProfileId === "general") return CATS_GENERAL;
            const prof = state.profiles.find(p => p.id === currentProfileId);
            if(!prof) return CATS_GENERAL;

            const isFemale = prof.gender === 'female';
            const age = prof.age !== null ? prof.age : 30;

            if(age <= 6) return CATS_BABY;
            if(age >= 7 && age <= 17) return isFemale ? CATS_TEEN_F : CATS_TEEN_M;
            return isFemale ? CATS_ADULT_F : CATS_GENERAL;
        }

        function render() {
            const cashInc = state.incomes.filter(i => i.account === 'cash').reduce((s,i) => s + i.amount, 0);
            const cardInc = state.incomes.filter(i => i.account !== 'cash').reduce((s,i) => s + i.amount, 0);
            const cashExp = state.transactions.filter(t => t.account === 'cash').reduce((s,t) => s + t.amount, 0);
            const cardExp = state.transactions.filter(t => t.account !== 'cash').reduce((s,t) => s + t.amount, 0);

            setTxt("main-total-balance", formatMoney(cashInc - cashExp + cardInc - cardExp));
            setTxt("main-card-balance", formatMoney(cardInc - cardExp));
            setTxt("main-cash-balance", formatMoney(cashInc - cashExp));

            if (currentTab === "home") renderHome();
            if (currentTab === "add") renderCats();
            if (currentTab === "debts") renderDebts(); 
            if (currentTab === "report") renderReport();
        }

        function renderHome() {
            const todayStr = new Date().toISOString().slice(0, 10);
            const myTxs = state.transactions.filter(t => t.date === todayStr && (t.profileId === currentProfileId || !t.profileId));
            const myIncs = state.incomes.filter(i => i.date === todayStr && (i.profileId === currentProfileId || !i.profileId));
            const combined = [...myIncs.map(i => ({...i, mode: 'plus'})), ...myTxs.map(t => ({...t, mode: 'minus'}))].sort((a,b) => b.id - a.id).slice(0, 5);

            let homeListCode = "";
            if(combined.length === 0) { homeListCode = `<div style='text-align:center; padding:15px; color:#475569; font-size:12px;'>${state.profiles.find(p=>p.id===currentProfileId).name} uchun bugun amal yo'q.</div>`; } 
            else {
                combined.forEach(item => {
                    const color = item.mode === 'plus' ? '#10b981' : (item.cat === "O'tkazma" ? '#3b82f6' : '#f472b6');
                    const sign = item.mode === 'plus' ? '+' : '-';
                    homeListCode += `<div class="history-item">
                        <div>
                            <div style="font-weight:bold; color:${item.mode==='plus'?'#10b981':'#fff'}">${item.desc}</div>
                            <div style="font-size:10px; color:#64748b;">👤 ${item.user || 'Siz'} | ${item.subCat ? '['+item.subCat+']' : item.cat}</div>
                        </div>
                        <div style="color:${color}; font-weight:bold; margin-left:auto;">${sign}${formatMoney(item.amount).replace(" so'm", "")}</div>
                        <button class="delete-btn" onclick="deleteItem('${item.mode==='minus'?'tx':'inc'}', ${item.id})">✕</button>
                    </div>`;
                });
            }
            setHtml("home-today-list", homeListCode);
        }

        function renderCats() {
            if(addMode === "transfer") return;
            const container = document.getElementById("cats-container"); if(!container) return;
            
            if (addMode === "income") {
                let code = "<div class='cat-grid'>";
                INCOME_SOURCES.forEach(s => { code += `<button class="cat-grid-btn" style="background:#1e293b; border:1px solid #334155;" onclick="finalSelect('${s.label}')"><span style="font-size:20px;">${s.icon}</span><span>${s.label}</span></button>`; });
                container.innerHTML = code + "</div>"; return;
            }
            
            const currentCats = getCurrentProfileCategories();

            if (activeSubCat) {
                let code = `<div><div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;"><span style="font-size:11px; color:#94a3b8;">${activeMainCat.label} ➔ <b style="color:#fff">${activeSubCat.label}</b></span><button onclick="backToMainCats()" style="background:#475569; color:#fff; border:none; padding:4px 8px; border-radius:6px; font-size:10px; cursor:pointer;">⬅ Orqaga</button></div><div class='sub-grid'>`;
                activeSubCat.items.forEach(item => { 
                    code += `<button class="cat-grid-btn" style="background:#3b82f6;" onclick="finalSelect('${item.label}')"><span style="font-size:22px;">${item.icon}</span><span>${item.label}</span></button>`; 
                });
                container.innerHTML = code + `</div></div>`;
            } 
            else if (activeMainCat && activeMainCat.subs && activeMainCat.subs.length > 0) {
                let code = `<div><div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;"><span style="font-size:12px; color:#94a3b8;">Rukun: <b>${activeMainCat.label}</b></span><button onclick="backToMainCats()" style="background:#475569; color:#fff; border:none; padding:4px 8px; border-radius:6px; font-size:10px; cursor:pointer;">⬅ Orqaga</button></div><div class='sub-grid'>`;
                activeMainCat.subs.forEach(sub => { 
                    const isFolder = sub.items && sub.items.length > 0;
                    const action = isFolder ? `clickSubCat('${sub.id}')` : `finalSelect('${sub.label}')`;
                    const fIcon = isFolder ? "📂" : "";
                    code += `<button class="cat-grid-btn" style="background:#334155;" onclick="${action}"><span style="font-size:22px;">${sub.icon}</span><span>${sub.label} <br/>${fIcon}</span></button>`; 
                });
                container.innerHTML = code + `<button class="cat-grid-btn" style="background:#4b5563;" onclick="finalSelect('${activeMainCat.label}')"><span style="font-size:22px;">⚙️</span><span>Umumiy</span></button></div></div>`;
            } 
            else {
                let code = "<div class='cat-grid'>";
                currentCats.forEach(c => { code += `<button class="cat-grid-btn" style="background:${c.color};" onclick="clickMainCat('${c.id}')"><span style="font-size:20px;">${c.icon}</span><span>${c.label}</span></button>`; });
                container.innerHTML = code + "</div>";
            }
        }

        window.clickMainCat = function(id) {
            const currentCats = getCurrentProfileCategories();
            const cat = currentCats.find(c => c.id === id);
            if (cat && cat.subs && cat.subs.length > 0) { activeMainCat = cat; renderCats(); setHtml("stay-hint",""); }
            else if(cat) { finalSelect(cat.label); }
        }

        window.clickSubCat = function(id) {
            const sub = activeMainCat.subs.find(s => s.id === id);
            if(sub && sub.items && sub.items.length > 0) { activeSubCat = sub; renderCats(); setHtml("stay-hint",""); }
            else { finalSelect(sub ? sub.label : 'Xato'); }
        }

        window.backToMainCats = function() { 
            if(activeSubCat) { activeSubCat = null; } 
            else { activeMainCat = null; }
            setHtml("stay-hint",""); renderCats(); 
        }

        window.finalSelect = function(label) {
            const amt = parseFloat(amountStr); if (!amt || amt <= 0) { showToast("Summani kiriting!", true); return; }
            const d = new Date(); const descEl = document.getElementById("add-desc");
            let finalDesc = descEl && descEl.value.trim() ? descEl.value.trim() : "";
            
            if(!finalDesc) {
                if(label === "Oylik maosh") finalDesc = OY_NOMLARI[d.getMonth()] + " oyligi";
                else finalDesc = label; 
            }

            let path = "";
            if (activeSubCat) path = activeSubCat.label + " ➔ " + label;
            else if (activeMainCat) path = label;

            const item = {
                id: Date.now(), amount: amt, desc: finalDesc,
                cat: activeMainCat ? activeMainCat.label : label, 
                subCat: path,
                account: accountType, date: d.toISOString().slice(0, 10), time: d.toLocaleTimeString("uz-UZ", { hour: "2-digit", minute: "2-digit" }), 
                user: telegramUserName, profileId: currentProfileId 
            };
            if (addMode === "expense") state.transactions.unshift(item); else state.incomes.unshift(item);
            
            amountStr = ""; if(descEl) descEl.value = ""; setTxt("num-display", "0");
            saveState(); 

            if (activeSubCat || activeMainCat) {
                setHtml("stay-hint", `✅ Oxirgi: <b>${formatMoney(amt)}</b> (${label}). Yana kiriting yoki Orqaga bosing!`);
                renderCats();
            } else { setHtml("stay-hint", ""); }
            showToast("Saqlandi ✓");
        }

        window.deleteItem = function(type, id) {
            if(type === 'tx') state.transactions = state.transactions.filter(t => t.id !== id);
            else state.incomes = state.incomes.filter(i => i.id !== id);
            saveState(); showToast("O'chirildi");
        }

        function renderReport() {
            const todayStr = new Date().toISOString().slice(0, 10);
            let fromD = getVal("report-from-date"); let toD = getVal("report-to-date");
            if (!fromD || !toD) { fromD = todayStr; toD = todayStr; }

            const filteredTxs = state.transactions.filter(t => t.date >= fromD && t.date <= toD && (t.profileId === currentProfileId || !t.profileId));
            const filteredIncs = state.incomes.filter(i => i.date >= fromD && i.date <= toD && (i.profileId === currentProfileId || !i.profileId));
            
            const totalPeriodInc = filteredIncs.reduce((s,i)=>s+i.amount, 0);
            const totalPeriodExp = filteredTxs.filter(t => t.cat !== "O'tkazma").reduce((s,t)=>s+t.amount, 0); 

            setTxt("report-month-inc", formatMoney(totalPeriodInc));
            setTxt("report-month-exp", formatMoney(totalPeriodExp));

            let catsCode = "";
            const currentCats = getCurrentProfileCategories();
            if (filteredTxs.length === 0) catsCode = "<div style='text-align:center; padding:15px; color:#475569; font-size:12px;'>Xarajat yo'q.</div>";
            else {
                currentCats.forEach(mainCat => {
                    const catSum = filteredTxs.filter(t => t.cat === mainCat.label).reduce((s,t)=>s+t.amount, 0);
                    if (catSum > 0) {
                        const percent = totalPeriodExp > 0 ? Math.round((catSum / totalPeriodExp) * 100) : 0;
                        catsCode += `<div style="background:#1e293b; padding:10px; border-radius:12px; margin-bottom:8px; border:1px solid #334155;">
                            <div style="display:flex; justify-content:space-between; font-weight:bold; font-size:13px;">
                                <span>${mainCat.icon} ${mainCat.label} (${percent}%)</span>
                                <span style="color:${mainCat.color || '#fff'};">${formatMoney(catSum)}</span>
                            </div>
                            <div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${percent}%; background:${mainCat.color || '#3b82f6'};"></div></div>
                        </div>`;
                    }
                });
            }
            setHtml("report-cats-analysis", catsCode);

            let chronCode = "";
            const combined = [...filteredIncs.map(i => ({...i, mode: 'plus'})), ...filteredTxs.map(t => ({...t, mode: 'minus'}))].sort((a,b) => b.id - a.id);
            if(combined.length === 0) chronCode = "<div style='text-align:center; color:#475569; font-size:12px; padding:10px;'>Tarix bo'sh.</div>";
            else {
                combined.forEach(item => {
                    const color = item.mode === 'plus' ? '#10b981' : (item.cat === "O'tkazma" ? '#3b82f6' : '#f472b6');
                    const sign = item.mode === 'plus' ? '+' : '-';
                    chronCode += `<div style="display:flex; align-items:center; justify-content:space-between; padding:8px 0; border-bottom:1px solid #1e293b; font-size:13px;">
                        <div>
                            <div style="font-weight:bold; color:${item.mode==='plus'?'#10b981':'#fff'}">${item.desc}</div>
                            <div style="font-size:10px; color:#64748b;">👤 ${item.user || 'Siz'} | ${item.date} | ${item.time}</div>
                        </div>
                        <div style="display:flex; align-items:center; gap:8px; margin-left:auto;">
                            <span style="font-weight:bold; color:${color};">${sign}${formatMoney(item.amount).replace(" so'm", "")}</span>
                            <button class="delete-btn" onclick="deleteItem('${item.mode==='minus'?'tx':'inc'}', ${item.id})">✕</button>
                        </div>
                    </div>`;
                });
            }
            setHtml("report-chronology", chronCode);
        }

        window.downloadExcel = function() {
            let csv = "\uFEFFSana,Profil,Turi,Odam,Rukun,Kategoriya_2,Izoh,Summa,Hisob\n";
            const rows = [...state.incomes.map(i => ({...i, tStr: "Kirim"})), ...state.transactions.map(t => ({...t, tStr: "Chiqim"}))].sort((a,b) => b.id - a.id);
            rows.forEach(r => { 
                const profName = state.profiles.find(p=>p.id===r.profileId)?.name || 'Umumiy';
                csv += `${r.date},${profName},${r.tStr},${r.user || 'Siz'},${r.cat || ''},${r.subCat || ''},${r.desc},${r.amount},${r.account==='cash'?'Naqd':'Plastik'}\n`; 
            });
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' }); const url = URL.createObjectURL(blob);
            const link = document.createElement("a"); link.setAttribute("href", url); link.setAttribute("download", "Oila_Moliya_Hisobot.csv");
            document.body.appendChild(link); link.click(); document.body.removeChild(link);
        }

        if (document.readyState === "loading") { document.addEventListener("DOMContentLoaded", init); } else { init(); }
    </script>
</body>
</html>

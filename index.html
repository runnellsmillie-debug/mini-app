<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>1Money Family ERP - Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-dark: #0f172a; --bg-card: #1e293b; --text-main: #f8fafc; --text-muted: #94a3b8;
            --primary: #3b82f6; --success: #10b981; --danger: #ef4444; --warning: #f59e0b;
            --border-color: #334155;
        }
        body { margin: 0; background-color: var(--bg-dark); color: var(--text-main); font-family: -apple-system, sans-serif; padding: 15px; padding-bottom: 85px; max-width: 480px; margin: 0 auto; box-sizing: border-box; user-select: none; }
        
        /* Tepadagi menyu qismi */
        .top-header { display: flex; align-items: center; margin-bottom: 15px; }
        .menu-btn { background: transparent; border: none; color: var(--text-muted); padding: 5px 0; font-weight: bold; font-size: 16px; cursor: pointer; display: flex; align-items: center; gap: 10px; }
        
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: var(--bg-card); border-top: 1px solid var(--border-color); display: flex; padding: 10px 5px; z-index: 1000; }
        .nav-item { flex: 1; text-align: center; color: var(--text-muted); font-size: 12px; font-weight: bold; padding: 8px 0; border-radius: 12px; cursor: pointer; }
        .nav-item.active { color: var(--primary); background: rgba(59, 130, 246, 0.1); }
        
        .balance-card-main { background: linear-gradient(135deg, #1e293b, #0f172a); border: 1px solid var(--border-color); border-radius: 20px; padding: 20px 15px; text-align: center; margin-bottom: 15px; }
        .widget-box { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 16px; padding: 15px; margin-bottom: 15px; }
        .input-text { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid var(--border-color); background: var(--bg-dark); color: var(--text-main); font-size: 14px; box-sizing: border-box; outline: none; margin-bottom: 8px; }
        .btn-primary { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; font-weight: bold; border-radius: 12px; cursor: pointer; margin-bottom:8px; }
        .btn-success { background: var(--success); }
        
        .hidden { display: none !important; }
        #toast-msg { display: none; position: fixed; top: 20px; left: 50%; transform: translateX(-50%); padding: 12px 24px; border-radius: 20px; z-index: 9999; background: var(--success); font-weight: bold; }
        
        .mode-selector { display: flex; gap: 8px; margin-bottom: 15px; }
        .mode-btn { flex: 1; padding: 10px 15px; border-radius: 10px; border: none; font-weight: bold; color: #fff; background: var(--bg-card); border: 1px solid var(--border-color); transition: 0.3s; }
        
        /* Katta menyu tugmalari */
        .main-menu-btn { width: 100%; padding: 16px; background: var(--bg-card); color: var(--text-main); border: 1px solid var(--border-color); border-radius: 14px; font-size: 16px; font-weight: bold; text-align: left; display: flex; align-items: center; gap: 12px; cursor: pointer; margin-bottom: 10px; }
        .main-menu-btn span.icon { font-size: 22px; }
        .main-menu-btn:active { transform: scale(0.98); }
    </style>
</head>
<body>

    <div id="toast-msg"></div>
    
    <div class="top-header">
        <button class="menu-btn" id="main-menu-btn">
            <span style="font-size:22px; color:var(--primary);">☰</span>
        </button>
        <button class="menu-btn hidden" id="back-btn" onclick="closeSubView()">
            <span style="font-size:22px; color:var(--primary);">⬅</span>
        </button>
        <span id="app-title" style="font-weight:bold; font-size:16px; margin-left:10px;">1Money ERP</span>
    </div>

    <div id="tab-home" class="tab-content">
        <div class="balance-card-main">
            <div style="font-size:11px; color:var(--text-muted); margin-bottom:6px;">JAMI MAVJUD MABLAG'</div>
            <div id="main-balance" style="font-size:32px; font-weight:bold;">0 so'm</div>
        </div>
        </div>

    <div id="tab-other" class="tab-content hidden">
        
        <div id="bank-main-menu">
            <button class="main-menu-btn" onclick="openCreditView()">
                <span class="icon">💳</span> Kreditlar
            </button>
            <button class="main-menu-btn">
                <span class="icon">🏦</span> Omonatlar
            </button>
            <button class="main-menu-btn">
                <span class="icon">🤝</span> Qarzlar
            </button>
        </div>

        <div id="credit-sub-view" class="hidden">
            <div class="mode-selector">
                <button id="cr-tab-aktiv" class="mode-btn" onclick="switchCreditTab('aktiv')">Aktiv</button>
                <button id="cr-tab-arxiv" class="mode-btn" onclick="switchCreditTab('arxiv')">Arxiv</button>
                <button id="cr-tab-calc" class="mode-btn" onclick="switchCreditTab('calc')">Kalkulyator</button>
            </div>
            
            <div id="cr-content-aktiv">
                <div style="text-align:center; color:var(--text-muted); font-size:13px; margin-top:30px;">
                    Sizda hozircha aktiv kreditlar yo'q.
                </div>
            </div>

            <div id="cr-content-arxiv" class="hidden">
                <div style="text-align:center; color:var(--text-muted); font-size:13px; margin-top:30px;">
                    Arxivlangan kreditlar ro'yxati.
                </div>
            </div>

            <div id="cr-content-calc" class="hidden">
                <div class="widget-box">
                    <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                        <b style="color:var(--primary);">Kredit kalkulyatori</b>
                        <button onclick="loadExternalData()" style="background:transparent; border:1px solid var(--primary); color:var(--primary); border-radius:6px; font-size:10px;">🔄 Yangilash</button>
                    </div>
                    <select id="credit-bank" class="input-text" onchange="updateCreditTypes()"></select>
                    <select id="credit-type-name" class="input-text"></select>
                    <input type="text" class="input-text" placeholder="Summa..." />
                    <button class="btn-primary btn-success">Saqlash</button>
                </div>
            </div>
        </div>

    </div>

    <div class="bottom-nav">
        <div class="nav-item active" id="nav-home" onclick="switchTab('home')">🏠 Asosiy</div>
        <div class="nav-item" id="nav-other" onclick="switchTab('other')">🏦 Bank</div>
    </div>

    <script>
        let CONFIG = { appName: "1Money ERP", dataUrls: { banks: "https://raw.githubusercontent.com/runnellsmillie-debug/mini-app/main/banks.json" } };
        let BANK_DB = {};
        const el = id => document.getElementById(id);

        // TAB ALMASHTIRISH (Asosiy / Bank)
        window.switchTab = id => { 
            document.querySelectorAll(".nav-item").forEach(b => b.classList.remove("active")); 
            el("nav-"+id).classList.add("active");
            
            document.querySelectorAll(".tab-content").forEach(e => e.classList.add("hidden")); 
            el("tab-"+id).classList.remove("hidden");
            
            // Boshqa tabga o'tganda Ichki menyuni yopib, asl holiga qaytarish
            if(id !== 'other') {
                closeSubView();
            }
        };

        // KREDIT MENYUSINI OCHISH (Ichki oynaga kirish)
        window.openCreditView = () => {
            el('bank-main-menu').classList.add('hidden');
            el('credit-sub-view').classList.remove('hidden');
            
            // Header'ni o'zgartirish
            el('app-title').innerText = "Kredit";
            el('main-menu-btn').classList.add('hidden');
            el('back-btn').classList.remove('hidden');
            
            // Birinchi marta ochilganda "Aktiv" tugmasi tanlangan bo'lsin
            switchCreditTab('aktiv');
        };

        // ORQAGA QAYTISH TUGMASI (Nazad)
        window.closeSubView = () => {
            el('credit-sub-view').classList.add('hidden');
            el('bank-main-menu').classList.remove('hidden');
            
            // Header'ni asl holiga qaytarish
            el('app-title').innerText = CONFIG.appName;
            el('back-btn').classList.add('hidden');
            el('main-menu-btn').classList.remove('hidden');
        };

        // 3 TA TUGMANI (Aktiv, Arxiv, Kalkulyator) BOSHQARISH
        window.switchCreditTab = (tab) => {
            const tabs = ['aktiv', 'arxiv', 'calc'];
            tabs.forEach(t => {
                let btn = el('cr-tab-' + t);
                let content = el('cr-content-' + t);
                
                if(t === tab) {
                    btn.style.background = 'var(--primary)';
                    btn.style.borderColor = 'var(--primary)';
                    content.classList.remove('hidden');
                } else {
                    btn.style.background = 'var(--bg-card)';
                    btn.style.borderColor = 'var(--border-color)';
                    content.classList.add('hidden');
                }
            });
        };

        // BAZANI YUKLASH (Kalkulyator uchun)
        async function loadExternalData() {
            try {
                let bankRes = await fetch(CONFIG.dataUrls.banks + '?nocache=' + Date.now());
                if(bankRes.ok) {
                    BANK_DB = await bankRes.json();
                    renderBankSelect();
                }
            } catch (error) {
                console.error("Xato:", error);
            }
        }

        window.renderBankSelect = () => {
            const bEl = el("credit-bank"); if(!bEl) return;
            bEl.innerHTML = '<option value="">Bankni tanlang...</option>' + Object.keys(BANK_DB).map(b => `<option value="${b}">${BANK_DB[b].icon || '🏦'} ${b}</option>`).join("");
            updateCreditTypes();
        };

        window.updateCreditTypes = () => {
            const b = el("credit-bank").value, tEl = el("credit-type-name");
            if(!b || !BANK_DB[b]) { tEl.innerHTML = '<option value="">Turini tanlang...</option>'; return; }
            tEl.innerHTML = '<option value="">Turini tanlang...</option>' + BANK_DB[b].credits.map(c => `<option value="${c.id}">${c.icon || '💸'} ${c.name} (${c.rate}%)</option>`).join("");
        };

        document.addEventListener("DOMContentLoaded", () => {
            loadExternalData();
        });
    </script>
</body>
</html>

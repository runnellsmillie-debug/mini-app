<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>1Money Pro - Hisobot va Sub-Kategoriyalar</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { margin: 0; background-color: #0f172a; color: #f8fafc; font-family: -apple-system, sans-serif; }
        .tab-btn { flex: 1; padding: 12px; border-radius: 14px; border: none; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 14px; }
        .balance-card { background: #1e293b; border: 1px solid #334155; border-radius: 20px; padding: 15px; flex: 1; box-sizing: border-box; }
        .num-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #fff; font-size: 22px; border-radius: 14px; padding: 12px 0; cursor: pointer; }
        .num-btn:active { background: rgba(255,255,255,0.1); }
        .cat-grid-btn { padding: 14px 5px; border: none; border-radius: 16px; color: #fff; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 6px; font-weight: bold; transition: 0.15s; }
        .cat-grid-btn:active { transform: scale(0.95); }
        input[type="text"] { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #334155; background: #1e293b; color: #fff; font-size: 16px; box-sizing: border-box; outline: none; }
    </style>
</head>
<body>
    
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const tg = window.Telegram.WebApp;
        
        try { tg.ready(); tg.expand(); } catch(e) {}

        // ICHMA-ICH SUB-KATEGORIYALAR TIZIMI
        const CATEGORIES = [
          { id: "kommunal", label: "Kommunal", icon: "🏠", color: "#FBBF24", subs: [
              { id: "svet", label: "Svet (Elektr)", icon: "⚡" },
              { id: "gaz", label: "Gaz to'lovi", icon: "🔥" },
              { id: "suv", label: "Suv xizmati", icon: "💧" },
              { id: "musor", label: "Chiqindi/Oshxona", icon: "🧹" }
          ]},
          { id: "oziq", label: "Oziq-ovqat", icon: "🛒", color: "#FF6B6B", subs: [
              { id: "bozor", label: "Bozorlik", icon: "🥩" },
              { id: "magazin", label: "Do'kon/Supermarket", icon: "🍞" },
              { id: "kafe", label: "Restoran/Kafe", icon: "🍔" }
          ]},
          { id: "avto", label: "Jetour Avto", icon: "🚗", color: "#2196F3", subs: [
              { id: "benzin", label: "Yoqilg'i (Yoq)", icon: "⛽" },
              { id: "remont", label: "Zapchast/Usta", icon: "🔧" },
              { id: "yuvish", label: "Moyka", icon: "🧼" }
          ]},
          { id: "oila", label: "Oila/Bog'cha", icon: "🧸", color: "#8B5CF6", subs: [
              { id: "bogcha", label: "Bog'cha to'lovi", icon: "👶" },
              { id: "maktab", label: "Kurs/Maktab", icon: "📚" },
              { id: "ro'zg'or", label: "Kiyim/Xaridlar", icon: "👗" }
          ]},
          { id: "biznes", label: "IMSOA Biznes", icon: "🏢", color: "#607D8B", subs: [
              { id: "material", label: "Xomashyo/Uskuna", icon: "🧱" },
              { id: "ishchi", label: "Oyliklar/Ish haqi", icon: "💵" },
              { id: "boshqa_biz", label: "Boshqa xarajat", icon: "📈" }
          ]},
          { id: "soglik", label: "Sog'liq", icon: "💊", color: "#34D399", subs: [
              { id: "apteka", label: "Dori-darmon", icon: "🍏" },
              { id: "shifokor", label: "Klinika/Tekshiruv", icon: "🩺" }
          ]},
          { id: "boshqa", label: "Boshqa", icon: "📦", color: "#94A3B8", subs: [] }
        ];

        const INCOME_SOURCES = [
          { id: "maosh", label: "Oylik maosh", icon: "💼", color: "#10B981" },
          { id: "imsoa_k", label: "IMSOA daromad", icon: "💰", color: "#059669" },
          { id: "qarz_q", label: "Qarz qaytishi", icon: "🤝", color: "#84CC16" },
          { id: "boshqa_k", label: "Qo'shimcha", icon: "FBBF24" }
        ];

        const STORAGE_KEY = "xarajat_pro_v7";

        function loadData() {
          try {
            const raw = localStorage.getItem(STORAGE_KEY);
            return raw ? JSON.parse(raw) : { transactions: [], incomes: [], budget: 5000000 };
          } catch {
            return { transactions: [], incomes: [], budget: 5000000 };
          }
        }

        // To'liq so'm formatida ko'rsatish
        function formatMoney(n) {
          return new Intl.NumberFormat("uz-UZ").format(Math.round(Math.abs(n))) + " so'm";
        }

        function App() {
          const [data, setData] = useState(loadData);
          const [tab, setTab] = useState("home"); // home, add, report
          const [addMode, setAddMode] = useState("expense");
          const [accountType, setAccountType] = useState("card");
          
          // Sub-kategoriya navigatsiyasi uchun state
          const [activeMainCat, setActiveMainCat] = useState(null);
          
          const [amountStr, setAmountStr] = useState("");
          const [desc, setDesc] = useState("");

          const [toast, setToast] = useState(null);
          const [sessionData, setSessionData] = useState([]);

          useEffect(() => { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }, [data]);

          const showToast = (msg, type = "success") => {
            setToast({ msg, type });
            setTimeout(() => setToast(null), 3000);
          };

          const handleNumpad = (val) => {
            if (val === "C") setAmountStr("");
            else if (val === "⌫") setAmountStr(prev => prev.slice(0, -1));
            else if (val === "000") setAmountStr(prev => prev ? prev + "000" : prev);
            else if (amountStr.length < 10) setAmountStr(prev => prev + val);
          };

          const allIncomes = data.incomes || [];
          const allTx = data.transactions || [];

          // Balans hisoblar
          const cashIncome = allIncomes.filter(i => i.account === 'cash').reduce((s,i) => s+i.amount, 0);
          const cardIncome = allIncomes.filter(i => i.account !== 'cash').reduce((s,i) => s+i.amount, 0);
          const cashExp = allTx.filter(t => t.account === 'cash').reduce((s,t) => s+t.amount, 0);
          const cardExp = allTx.filter(t => t.account !== 'cash').reduce((s,t) => s+t.amount, 0);

          const cashBalance = cashIncome - cashExp;
          const cardBalance = cardIncome - cardExp;
          const totalBalance = cashBalance + cardBalance;

          // Joriy sana va oy kalitlari
          const todayStr = new Date().toISOString().slice(0, 10);
          const monthStr = new Date().toISOString().slice(0, 7);

          // Hisobot uchun filtrlashlar
          const todayTransactions = allTx.filter(t => t.date === todayStr);
          const monthTransactions = allTx.filter(t => t.date.startsWith(monthStr));
          const monthIncomes = allIncomes.filter(i => i.date.startsWith(monthStr));
          
          const totalMonthExp = monthTransactions.reduce((s,t)=>s+t.amount, 0);
          const totalMonthInc = monthIncomes.reduce((s,i)=>s+i.amount, 0);

          function handleCategorySelect(catLabel, catId) {
            const amt = parseFloat(amountStr);
            if (!amt || amt <= 0) { showToast("Iltimos, avval summani kiriting!", "error"); return; }
            
            const itemDesc = desc.trim() || catLabel;
            const newItem = {
              id: Date.now(), amount: amt, desc: itemDesc,
              cat: activeMainCat ? activeMainCat.label : catLabel,
              subCat: activeMainCat ? catLabel : "",
              type: addMode === "expense" ? "minus" : "plus",
              account: accountType, date: todayStr, time: new Date().toLocaleTimeString("uz-UZ", { hour: "2-digit", minute: "2-digit" })
            };

            if (addMode === "expense") {
              setData(d => ({ ...d, transactions: [newItem, ...(d.transactions||[])] }));
            } else {
              setData(d => ({ ...d, incomes: [newItem, ...(d.incomes||[])] }));
            }
            
            const methodStr = accountType === "cash" ? "Naqd" : "Plastik";
            const botCategoryName = activeMainCat ? `${activeMainCat.label} -> ${catLabel}` : catLabel;
            setSessionData(prev => [...prev, { amount: amt, category: `${botCategoryName} (${methodStr})`, type: addMode === "expense" ? "minus" : "plus" }]);
            
            showToast("Muvaffaqiyatli saqlandi ✓");
            setAmountStr(""); setDesc(""); setActiveMainCat(null); setTab("home");
          }

          function sendToTelegram() {
            if(sessionData.length > 0) tg.sendData(JSON.stringify(sessionData));
            else tg.close();
          }

          return (
            <div style={{ fontFamily: "-apple-system, sans-serif", color: "#f8fafc", padding: "15px", maxWidth: "430px", margin: "0 auto" }}>
              {toast && (
                <div style={{ position:"fixed", top:10, left:"50%", transform:"translateX(-50%)", background: toast.type==="error" ? "#EF4444" : "#10B981", padding:"10px 20px", borderRadius:20, zIndex:1000, fontWeight:"bold" }}>
                  {toast.msg}
                </div>
              )}

              {/* TABS MENYU */}
              <div style={{ display:"flex", gap:8, marginBottom:15 }}>
                <button onClick={() => setTab("home")} className="tab-btn" style={{ background: tab==="home" ? "#3b82f6" : "#1e293b", color:"#fff" }}>Asosiy</button>
                <button onClick={() => setTab("add")} className="tab-btn" style={{ background: tab==="add" ? "#3b82f6" : "#1e293b", color:"#fff" }}>Kiritish</button>
                <button onClick={() => setTab("report")} className="tab-btn" style={{ background: tab==="report" ? "#3b82f6" : "#1e293b", color:"#fff" }}>Hisobot 📊</button>
              </div>

              {/* 1. ASOSIY SAHIFA */}
              {tab === "home" && (
                <div style={{ paddingBottom: "60px" }}>
                  <div style={{ background:"linear-gradient(135deg, #1e293b, #0f172a)", borderRadius:24, padding:20, marginBottom:15, border:"1px solid #334155", textAlign:"center" }}>
                    <div style={{ color:"#94a3b8", fontSize:12, textTransform:"uppercase", letterSpacing:"1px" }}>Umumiy Balans</div>
                    <div style={{ fontSize:28, fontWeight:"bold", margin:"8px 0" }}>{formatMoney(totalBalance)}</div>
                  </div>

                  <div style={{ display:"flex", gap:10, marginBottom:20 }}>
                    <div className="balance-card">
                        <div style={{ fontSize:11, color:"#94a3b8", marginBottom:3 }}>💳 Plastik</div>
                        <div style={{ fontSize:15, fontWeight:"bold" }}>{formatMoney(cardBalance)}</div>
                    </div>
                    <div className="balance-card">
                        <div style={{ fontSize:11, color:"#94a3b8", marginBottom:3 }}>💵 Naqd</div>
                        <div style={{ fontSize:15, fontWeight:"bold" }}>{formatMoney(cashBalance)}</div>
                    </div>
                  </div>

                  <div style={{ fontSize:14, fontWeight:"bold", color:"#94a3b8", marginBottom:10 }}>Bugungi xarajatlar:</div>
                  {todayTransactions.length === 0 ? (
                    <div style={{textAlign:"center", padding:20, color:"#475569", fontSize:13}}>Bugun hali xarajat kiritilmadi.</div>
                  ) : (
                    todayTransactions.map(t => (
                        <div key={t.id} style={{ display:"flex", alignItems:"center", background:"#1e293b", padding:12, borderRadius:12, marginBottom:8 }}>
                          <div style={{ flex:1 }}>
                             <div style={{fontWeight:"bold", fontSize:14}}>{t.desc}</div>
                             <div style={{fontSize:10, color:"#64748b"}}>{t.cat} {t.subCat ? `-> ${t.subCat}` : ''} | {t.time}</div>
                          </div>
                          <div style={{ color:"#f472b6", fontWeight:"bold" }}>-{formatMoney(t.amount)}</div>
                        </div>
                    ))
                  )}

                  <button onClick={sendToTelegram} style={{ width:"100%", padding:15, background:"#10b981", color:"white", border:"none", borderRadius:12, fontWeight:"bold", marginTop:25, fontSize:15 }}>
                    ✅ Saqlash va Botga yuborish ({sessionData.length})
                  </button>
                </div>
              )}

              {/* 2. KIRITISH SAHIFA (SUB-KATEGORIYALAR BILAN) */}
              {tab === "add" && (
                <div>
                  <div style={{ display:"flex", gap:10, marginBottom:12 }}>
                    <button onClick={()=>{setAddMode("expense"); setActiveMainCat(null);}} style={{ flex:1, padding:10, borderRadius:10, border:"none", background:addMode==="expense"?"#ef4444":"#1e293b", color:"#fff", fontWeight:"bold" }}>▼ Chiqim</button>
                    <button onClick={()=>{setAddMode("income"); setActiveMainCat(null);}} style={{ flex:1, padding:10, borderRadius:10, border:"none", background:addMode==="income"?"#10b981":"#1e293b", color:"#fff", fontWeight:"bold" }}>▲ Kirim</button>
                  </div>

                  <div style={{ display:"flex", gap:10, marginBottom:12 }}>
                    <button onClick={()=>setAccountType("card")} style={{ flex:1, padding:8, borderRadius:8, border:accountType==="card"?"2px solid #3b82f6":"2px solid transparent", background:"#1e293b", color:"#fff", fontSize:12 }}>💳 Plastik</button>
                    <button onClick={()=>setAccountType("cash")} style={{ flex:1, padding:8, borderRadius:8, border:accountType==="cash"?"2px solid #10b981":"2px solid transparent", background:"#1e293b", color:"#fff", fontSize:12 }}>💵 Naqd</button>
                  </div>

                  <div style={{ fontSize:32, fontWeight:"bold", textAlign:"center", marginBottom:12, height:40, color:"#fff" }}>
                    {amountStr ? formatMoney(parseInt(amountStr)).replace(" so'm", "") : "0"}
                  </div>

                  {/* KATEGORIYALAR PANELI (Ustiga bosganda ichidagilar ochiladi) */}
                  <div style={{ background:"rgba(255,255,255,0.02)", padding:12, borderRadius:16, marginBottom:12, border:"1px dashed #334155" }}>
                    {activeMainCat ? (
                      <div>
                        <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:10}}>
                            <span style={{fontSize:13, color:"#94a3b8"}}>Yo'nalish: <b>{activeMainCat.label}</b></span>
                            <button onClick={()=>setActiveMainCat(null)} style={{background:"#475569", color:"#fff", border:"none", padding:"4px 10px", borderRadius:6, fontSize:11, cursor:"pointer"}}>⬅ Orqaga</button>
                        </div>
                        <div style={{ display:"grid", gridTemplateColumns:"repeat(3, 1fr)", gap:8 }}>
                          {activeMainCat.subs.map(sub => (
                            <button key={sub.id} onClick={()=>handleCategorySelect(sub.label, sub.id)} className="cat-grid-btn" style={{ background:"#334155" }}>
                              <span style={{fontSize:20}}>{sub.icon}</span>
                              <span style={{fontSize:11}}>{sub.label}</span>
                            </button>
                          ))}
                          <button onClick={()=>handleCategorySelect(activeMainCat.label, activeMainCat.id)} className="cat-grid-btn" style={{ background:"#4b5563" }}>
                              <span style={{fontSize:20}}>⚙️</span><span style={{fontSize:11}}>Umumiy</span>
                          </button>
                        </div>
                      </div>
                    ) : (
                      <div style={{ display:"grid", gridTemplateColumns:"repeat(4, 1fr)", gap:8 }}>
                        {(addMode === "expense" ? CATEGORIES : INCOME_SOURCES).map(c => (
                          <button key={c.id} onClick={() => { if(addMode==="expense" && c.subs && c.subs.length > 0) { setActiveMainCat(c); } else { handleCategorySelect(c.label, c.id); } }} className="cat-grid-btn" style={{ background: c.color || "#1e293b" }}>
                            <span style={{fontSize:20}}>{c.icon}</span>
                            <span style={{fontSize:10, whiteSpace:"nowrap", textOverflow:"ellipsis", overflow:"hidden", width:"100%"}}>{c.label}</span>
                          </button>
                        ))}
                      </div>
                    )}
                  </div>

                  <input type="text" placeholder="Izoh (ixtiyoriy)..." value={desc} onChange={e=>setDesc(e.target.value)} style={{ marginBottom:12 }} />

                  {/* NUMPAD */}
                  <div style={{ display:"grid", gridTemplateColumns:"repeat(3, 1fr)", gap:8 }}>
                    {["1","2","3","4","5","6","7","8","9","C","0","⌫"].map(btn => (
                      <button key={btn} onClick={()=>handleNumpad(btn)} className="num-btn">{btn}</button>
                    ))}
                  </div>
                </div>
              )}

              {/* 3. KUNLIK VA OYLIK HISOBOTLAR SAHIFASI */}
              {tab === "report" && (
                <div style={{ paddingBottom: "40px" }}>
                  <div style={{ fontSize:16, fontWeight:"bold", color:"#3b82f6", marginBottom:15, borderBottom:"1px solid #1e293b", paddingBottom:5 }}>📊 Shu oylik to'liq hisobot</div>
                  
                  <div style={{ display:"flex", gap:10, marginBottom:20 }}>
                    <div className="balance-card" style={{borderColor:"#10b981"}}>
                        <div style={{fontSize:11, color:"#94a3b8"}}>Oylik jami kirim</div>
                        <div style={{fontSize:15, fontWeight:"bold", color:"#10b981"}}>{formatMoney(totalMonthInc)}</div>
                    </div>
                    <div className="balance-card" style={{borderColor:"#ef4444"}}>
                        <div style={{fontSize:11, color:"#94a3b8"}}>Oylik jami chiqim</div>
                        <div style={{fontSize:15, fontWeight:"bold", color:"#ef4444"}}>{formatMoney(totalMonthExp)}</div>
                    </div>
                  </div>

                  <div style={{ fontSize:13, fontWeight:"bold", color:"#94a3b8", marginBottom:10 }}>Xarajatlar rukuni bo'yicha:</div>
                  
                  {monthTransactions.length === 0 ? (
                    <div style={{textAlign:"center", padding:30, color:"#475569"}}>Bu oy hali hisobot shakllanmadi.</div>
                  ) : (
                    // Rukunlar bo'yicha guruhlash mantiqi
                    CATEGORIES.map(mainCat => {
                        const catTx = monthTransactions.filter(t => t.cat === mainCat.label);
                        const catSum = catTx.reduce((s,t)=>s+t.amount, 0);
                        if(catSum === 0) return null;
                        
                        return (
                            <div key={mainCat.id} style={{ background:"#1e293b", padding:12, borderRadius:14, marginBottom:10, border:"1px solid #334155" }}>
                                <div style={{ display:"flex", justifyContent:"space-between", fontWeight:"bold", fontSize:14, marginBottom:5 }}>
                                    <span>{mainCat.icon} {mainCat.label}</span>
                                    <span style={{color:mainCat.color}}>{formatMoney(catSum)}</span>
                                </div>
                                <div style={{fontSize:11, color:"#64748b"}}>
                                    {catTx.map((t, idx) => (
                                        <div key={t.id} style={{display:"flex", justifyContent:"space-between", marginTop:3, paddingLeft:15}}>
                                            <span>• {t.desc} {t.subCat ? `(${t.subCat})` : ''}</span>
                                            <span>{formatMoney(t.amount)}</span>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        );
                    })
                  )}
                </div>
              )}

            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

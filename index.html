<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>1Money Family ERP</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg-dark: #0f172a; --bg-card: #1e293b; --text-main: #f8fafc; --primary: #3b82f6; --border-color: #334155; }
        body { margin: 0; background-color: var(--bg-dark); color: var(--text-main); font-family: sans-serif; padding: 15px; padding-bottom: 90px; }
        
        /* Sidebar fix */
        .sidebar-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 2000; }
        .sidebar-menu { position: fixed; top: 0; left: -280px; width: 270px; height: 100%; background: var(--bg-dark); z-index: 2001; transition: 0.3s; padding: 20px; border-right: 1px solid var(--border-color); }
        .sidebar-menu.open { left: 0; }
        
        /* Navigation */
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: var(--bg-card); display: flex; padding: 10px; border-top: 1px solid var(--border-color); z-index: 1000; }
        .nav-item { flex: 1; text-align: center; color: #94a3b8; font-size: 12px; cursor: pointer; }
        .nav-item.active { color: var(--primary); }
        
        /* Content */
        .hidden { display: none !important; }
        .widget-box { background: var(--bg-card); padding: 15px; border-radius: 12px; margin-bottom: 10px; border: 1px solid var(--border-color); }
        .main-menu-btn { width: 100%; padding: 15px; background: var(--bg-card); color: white; border: 1px solid var(--border-color); border-radius: 12px; margin-bottom: 10px; text-align: left; cursor: pointer; }
    </style>
</head>
<body>

    <div id="sidebar-overlay" class="sidebar-overlay" onclick="toggleSidebar()"></div>
    <div id="sidebar-menu" class="sidebar-menu">
        <h3>Profillar</h3>
        <div id="sidebar-profiles-list"></div>
    </div>

    <div class="top-header" style="display:flex; align-items:center; gap:10px;">
        <button onclick="toggleSidebar()" style="background:none; border:none; color:white; font-size:24px;">☰</button>
        <span id="app-title">1Money ERP</span>
    </div>

    <div id="tab-home" class="tab-content">
        <div class="widget-box">Jami mablag': <b id="main-balance">0 so'm</b></div>
    </div>

    <div id="tab-add" class="tab-content hidden">Kiritish sahifasi...</div>

    <div id="tab-other" class="tab-content hidden">
        <div id="bank-main-menu">
            <button class="main-menu-btn" onclick="openBankSubView('plan')">🛒 Bozorlik ro'yxati</button>
            <button class="main-menu-btn" onclick="openBankSubView('sched')">📅 Rejali to'lovlar</button>
            <button class="main-menu-btn" onclick="openBankSubView('credit')">💳 Kreditlar</button>
        </div>
        <div id="bank-sub-plan" class="hidden">Bozorlik...</div>
        <div id="bank-sub-sched" class="hidden">Rejali to'lovlar...</div>
        <div id="bank-sub-credit" class="hidden">Kreditlar bo'limi...</div>
    </div>

    <div id="tab-report" class="tab-content hidden">Hisobot...</div>

    <div class="bottom-nav">
        <div class="nav-item active" onclick="switchTab('home')">🏠 Asosiy</div>
        <div class="nav-item" onclick="switchTab('add')">➕ Kiritish</div>
        <div class="nav-item" onclick="switchTab('other')">💼 Xizmatlar</div>
        <div class="nav-item" onclick="switchTab('report')">📊 Hisobot</div>
    </div>

    <script>
        function toggleSidebar() { 
            document.getElementById('sidebar-menu').classList.toggle('open'); 
            document.getElementById('sidebar-overlay').style.display = document.getElementById('sidebar-menu').classList.contains('open') ? 'block' : 'none';
        }

        function switchTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
            document.getElementById('tab-' + id).classList.remove('hidden');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            event.currentTarget.classList.add('active');
        }

        function openBankSubView(type) {
            document.getElementById('bank-main-menu').classList.add('hidden');
            document.getElementById('bank-sub-' + type).classList.remove('hidden');
        }
        
        // Dastlabki yuklanish
        document.addEventListener("DOMContentLoaded", () => {
            console.log("ERP tizimi ishga tushdi");
        });
    </script>
</body>
</html>
